<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lịch Làm Việc</title>
  
  <!-- PWA Setup -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0056b3">
  <link rel="apple-touch-icon" href="./images/icon-192x192.png">
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div id="loader-container">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">Đang tải dữ liệu...</div>
  </div>
  
  <div id="content">
    <div class="title-container">
      <select id="month-selector" class="month-selector" onchange="loadSelectedMonth()"></select>
    </div>
    
    <div class="info-bar">
      <div class="info-text dept-text">Bộ phận: Blending & Packing</div>
      <div class="info-text" id="updateTime"></div>
    </div>
    
    <div class="table-responsive">
      <table class="schedule-table">
        <thead>
          <tr id="header-dates-row">
            <th rowspan="2" class="col-name-header">Họ Tên</th>
          </tr>
          <tr id="header-days-row"></tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <div id="install-banner">
    Ứng dụng có thể cài đặt để dùng offline! 
    <button onclick="installPWA()">Cài đặt</button>
  </div>
  
  <!-- App Logic -->
  <script src="./js/app.js"></script>
</body>
</html>
