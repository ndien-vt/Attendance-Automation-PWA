<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lịch Làm Việc 2026</title>
  
  <!-- PWA Setup -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0056b3">
  <link rel="icon" type="image/png" href="./images/icon-192x192.png">
  <link rel="apple-touch-icon" href="./images/icon-192x192.png">
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  
  <!-- OneSignal SDK -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  
  <!-- Styles -->
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div id="loader-container">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">Đang tải dữ liệu...</div>
  </div>
  
  <div id="content">
    <div class="title-container">
      <select id="month-selector" class="month-selector" onchange="loadSelectedMonth()"></select>
    </div>
    
    <div class="info-bar">
      <div class="info-text dept-text">Bộ phận: Blending & Packing</div>
      <div class="info-text">
        <span id="updateTime"></span>
        <button id="registerBtn" onclick="forceLogin()" style="font-size: 11px; padding: 3px 8px; margin-left: 10px; border: 1px solid #0056b3; background: white; color: #0056b3; border-radius: 3px; cursor: pointer; font-weight: bold;">Đăng ký</button>
        <span id="employeeBadge" style="display: none; font-size: 11px; padding: 3px 8px; margin-left: 10px; background: #e0f0ff; color: #0056b3; border-radius: 3px; font-weight: bold; border: 1px solid #0056b3; cursor: pointer;" onclick="forceLogin()" title="Nhấn để đổi mã nhân viên"></span>
      </div>
    </div>
    
    <div class="table-responsive">
      <table class="schedule-table">
        <thead>
          <tr id="header-dates-row">
            <th rowspan="2" class="col-name-header">Họ Tên</th>
          </tr>
          <tr id="header-days-row"></tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    
    <div style="text-align: center; padding: 15px 0 10px 0; color: #b0b0b0; font-weight: bold; font-size: 11px;">
      Copyright by Dien.Hoang - Version 1.<span id="app-version">32</span>
    </div>
  </div>
  
  <!-- Login Modal -->
  <div id="login-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10001; flex-direction:column; align-items:center; justify-content:center;">
    <div style="background:white; padding:20px; border-radius:8px; width:80%; max-width:300px; text-align:center;">
      <h3 style="margin-top:0; color:#0056b3;">Nhận dạng nhân viên</h3>
      <p style="font-size:13px; color:#555;">Vui lòng nhập mã nhân viên của bạn. Hệ thống sẽ tự động đối chiếu để xác nhận họ tên.</p>
      <input type="text" id="employee-code-input" placeholder="Ví dụ: NV001" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;">
      <button onclick="saveEmployeeCode()" style="background:#0056b3; color:white; border:none; padding:10px 20px; border-radius:4px; font-weight:bold; cursor:pointer; width:100%;">Lưu & Nhận Thông Báo</button>
      <button onclick="closeLoginModal()" style="background:transparent; color:#888; border:none; padding:10px; margin-top:5px; cursor:pointer; font-size:12px;">Bỏ qua</button>
    </div>
  </div>
  
  <!-- App Logic -->
  <script src="./js/app.js"></script>
</body>
</html>
